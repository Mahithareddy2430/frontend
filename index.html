<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="page">
        <article class="card">
            <div class="qr-area" aria-hidden="true">
                <div class="qr-square">
                    <img src="My_QR_Code_1-1024.png" alt="QR code">
                </div>
            </div>

            <h2 class="card-title">Improve your front-end skills by building projects</h2>
            <p class="card-desc">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
        </article>
    </main>
</body>
</html>
